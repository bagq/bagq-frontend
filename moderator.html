<!DOCTYPE html>
<html>
<head>
    <title>BAG-Q Moderator Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        html, body { height: 100%; margin: 0; }

        #map {
            height: 70vh;
            width: 100%;
        }

        .status-available { color: green; font-weight: bold; }
        .status-route { color: orange; font-weight: bold; }
    </style>
</head>

<body class="p-4">

<h3>BAG-Q Moderator Panel</h3>
<hr>

<!-- REGISTER DRIVER -->
<h5>Register Driver</h5>
<input type="text" id="plate" class="form-control mb-2" placeholder="Plate Number">
<input type="text" id="username" class="form-control mb-2" placeholder="Username">
<input type="password" id="password" class="form-control mb-2" placeholder="Password">
<button class="btn btn-success mb-4" onclick="registerDriver()">Register Driver</button>

<hr>

<h5>Live Jeepney Monitoring</h5>
<div id="map"></div>

<hr>

<h5>Registered Drivers</h5>
<ul id="driverList" class="list-group"></ul>

<script>

/* ==========================
   🧑‍✈️ REGISTER DRIVER
========================== */

function registerDriver() {
    const plate = document.getElementById("plate").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (!plate || !username || !password) {
        alert("All fields required.");
        return;
    }

    const drivers = JSON.parse(localStorage.getItem("drivers")) || [];
    drivers.push({ plate, username, password });
    localStorage.setItem("drivers", JSON.stringify(drivers));

    alert("Driver Registered!");
    displayDrivers();
}

function displayDrivers() {
    const drivers = JSON.parse(localStorage.getItem("drivers")) || [];
    const list = document.getElementById("driverList");
    list.innerHTML = "";

    drivers.forEach(driver => {
        const li = document.createElement("li");
        li.className = "list-group-item";
        li.textContent = driver.plate + " - " + driver.username;
        list.appendChild(li);
    });
}

displayDrivers();

/* ==========================
   🗺 MAP SYSTEM
========================== */

const map = L.map("map").setView([16.415, 120.575], 14);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors"
}).addTo(map);

const jeepneyIcon = L.icon({
    iconUrl: 'jeepney.png',
    iconSize: [32, 32],
    iconAnchor: [16, 16]
});

let driverMarkers = {};

/* ==========================
   🔄 LIVE TRACKING
========================== */

function loadLiveDrivers() {

    for (let key in localStorage) {

        if (key.startsWith("live_")) {

            const data = JSON.parse(localStorage.getItem(key));
            const plate = data.plate;

            if (!driverMarkers[plate]) {

                driverMarkers[plate] = L.marker([data.lat, data.lng], {
                    icon: jeepneyIcon
                }).addTo(map);

            } else {

                driverMarkers[plate].setLatLng([data.lat, data.lng]);
            }

            const statusClass = data.status === "Available"
                ? "status-available"
                : "status-route";

            driverMarkers[plate].bindPopup(
                "<b>Plate:</b> " + data.plate +
                "<br><b>Driver:</b> " + data.username +
                "<br><b>Status:</b> <span class='" + statusClass + "'>" + data.status + "</span>"
            );
        }
    }
}

// Refresh every 3 seconds
setInterval(loadLiveDrivers, 3000);

</script>

</body>
</html>
