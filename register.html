<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>BAG-Q Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f5f6fa;
}

.card-auth{
width:430px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 25px rgba(0,0,0,0.15);
}

#driverFields{
display:none;
}
</style>
</head>

<body>

<div class="card-auth">

<h4 class="text-center mb-3">BAG-Q Register</h4>

<form id="registerForm">

<div class="mb-2">
<label>Full Name</label>
<input id="fullName" class="form-control" required>
</div>

<div class="mb-2">
<label>Role</label>
<select id="role" class="form-select" required>
<option value="">Select Role</option>
<option value="commuter">Commuter</option>
<option value="driver">Driver</option>
<option value="dispatcher">Dispatcher</option>
</select>
</div>

<div class="mb-2">
<label>Username</label>
<input id="username" class="form-control" required>
</div>

<div class="mb-2">
<label>Email</label>
<input id="email" type="email" class="form-control" required>
</div>

<div class="mb-2">
<label>Password</label>
<input id="password" type="password" class="form-control" required>
</div>

<!-- DRIVER ONLY FIELDS -->
<div id="driverFields">

<hr>

<div class="mb-2">
<label>Plate Number</label>
<input id="plateNumber" class="form-control">
</div>

<div class="mb-2">
<label>Seating Capacity</label>
<input id="seatingCapacity" type="number" class="form-control">
</div>

<div class="mb-2">
<label>Jeepney Type</label>
<select id="jeepneyType" class="form-select">
<option value="traditional">Traditional</option>
<option value="modern">Modern</option>
</select>
</div>

</div>

<div id="errorMsg" class="text-danger mb-2"></div>

<button class="btn btn-success w-100">Register</button>

<p class="text-center mt-3">
Already have account?
<a href="login.html">Login</a>
</p>

</form>
</div>

<script>

const roleSelect=document.getElementById("role");
const driverFields=document.getElementById("driverFields");

/* Show driver fields if driver role */
roleSelect.addEventListener("change",()=>{
if(roleSelect.value==="driver"){
driverFields.style.display="block";
}else{
driverFields.style.display="none";
}
});

/* Register Submit */
document.getElementById("registerForm").addEventListener("submit",async e=>{
e.preventDefault();

const data={
fullName:document.getElementById("fullName").value,
role:document.getElementById("role").value,
username:document.getElementById("username").value,
email:document.getElementById("email").value,
password:document.getElementById("password").value,
plateNumber:document.getElementById("plateNumber")?.value || null,
seatingCapacity:document.getElementById("seatingCapacity")?.value || null,
jeepneyType:document.getElementById("jeepneyType")?.value || null
};

const res=await fetch("http://localhost:5000/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

const result=await res.json();

if(res.ok){
alert("Registration successful!");
window.location.href="login.html";
}else{
document.getElementById("errorMsg").innerText=result.message;
}

});

</script>

</body>
</html>
