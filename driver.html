<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAG-Q Driver</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

        #mainHeader {
            position: fixed; top: 0; left: 0; width: 100%; height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 2000;
        }
        #mainHeader .brand { font-weight: 700; font-size: 1.15rem; color: #fff; display: flex; align-items: center; gap: 8px; }
        #mainHeader .header-right { display: flex; align-items: center; gap: 10px; }
        #welcomeText { font-size: 0.85rem; color: rgba(255,255,255,0.9); }

        #map { height: calc(100vh - 56px); margin-top: 56px; width: 100%; position: relative; z-index: 1; }

        #driverPanel {
            position: fixed; top: 50%; left: 20px; transform: translateY(-50%);
            width: 300px; background: #fff; padding: 24px 20px; border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12); z-index: 1500;
        }
        #driverPanel .panel-title {
            font-size: 1.1rem; font-weight: 700; color: #2c3e50;
            display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
        }
        #driverPanel .panel-title i { color: #667eea; }

        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; }
        .info-row .label { color: #888; font-weight: 500; }

        .status-badge {
            display: inline-block; padding: 4px 14px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 600; color: #fff;
        }
        .status-badge.available { background: #28a745; }
        .status-badge.on-route { background: #ffc107; color: #333; }
        .status-badge.offline { background: #dc3545; }

        .dest-badge {
            display: inline-block; padding: 5px 12px; border-radius: 10px;
            font-size: 0.82rem; font-weight: 600; color: #fff; background: #667eea;
        }
        .dest-badge i { margin-right: 4px; }

        .gps-indicator {
            display: flex; align-items: center; gap: 6px; font-size: 0.8rem;
            color: #888; margin-top: 10px; padding: 8px 12px; background: #f8f9fa;
            border-radius: 8px;
        }
        .gps-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .gps-dot.active { background: #28a745; box-shadow: 0 0 6px rgba(40,167,69,0.4); }
        .gps-dot.inactive { background: #dc3545; }

        .btn-trip {
            border-radius: 10px; font-weight: 600; min-height: 42px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .btn-queue {
            border-radius: 10px; font-weight: 600; min-height: 42px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            background: #FF9800; border-color: #FF9800; color: #fff;
        }
        .btn-queue:hover { background: #e68a00; border-color: #e68a00; color: #fff; }

        #queueStatus {
            display: none; text-align: center; padding: 12px; margin-top: 8px;
            background: #f0faf0; border: 2px solid #28a745; border-radius: 12px;
        }
        #queueStatus .queue-position {
            font-size: 2rem; font-weight: 800; color: #28a745; line-height: 1.1;
        }
        #queueStatus .queue-label {
            font-size: 0.85rem; color: #555; margin-top: 2px;
        }
        .btn-leave-queue {
            font-size: 0.78rem; padding: 3px 12px; border-radius: 8px;
            margin-top: 8px;
        }

        #panelToggle {
            display: none; position: fixed; bottom: 20px; right: 20px;
            width: 52px; height: 52px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; font-size: 1.2rem; z-index: 1600;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4); cursor: pointer;
        }

        #reconnectBanner {
            position: fixed; top: 56px; left: 0; width: 100%;
            background: linear-gradient(135deg, #f7971e, #ffd200); color: #333;
            text-align: center; padding: 8px; font-size: 0.85rem; font-weight: 600;
            z-index: 2050; display: none;
        }

        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast-msg {
            padding: 12px 20px; border-radius: 10px; color: #fff; margin-bottom: 8px;
            animation: slideIn 0.3s; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
        }
        .toast-msg.success { background: #28a745; }
        .toast-msg.error { background: #dc3545; }
        .toast-msg.info { background: #17a2b8; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            #mainHeader { padding: 0 12px; }
            #mainHeader .brand { font-size: 1rem; }
            #welcomeText { max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

            #panelToggle { display: block; }

            #driverPanel {
                position: fixed; bottom: 0; left: 0; right: 0;
                width: 100%; top: auto; transform: none;
                border-radius: 20px 20px 0 0; max-height: 75vh;
                overflow-y: auto; transition: max-height 0.3s ease;
                padding: 16px 20px;
            }
            #driverPanel.panel-collapsed { max-height: 64px; overflow: hidden; }
            #driverPanel .panel-handle {
                width: 40px; height: 4px; background: #ddd; border-radius: 2px;
                margin: 0 auto 12px; display: block;
            }
        }
        @media (min-width: 769px) {
            #driverPanel .panel-handle { display: none; }
        }
    </style>
</head>

<body>

<div id="toastContainer"></div>
<div id="reconnectBanner"><i class="fas fa-wifi"></i> Connection lost. Reconnecting...</div>

<div id="mainHeader">
    <span class="brand"><i class="fas fa-bus"></i> BAG-Q Driver</span>
    <div class="header-right">
        <span id="welcomeText"></span>
        <button class="btn btn-sm btn-outline-light" style="border-radius:8px;font-size:0.8rem;font-weight:600" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<div id="driverPanel">
    <span class="panel-handle"></span>
    <div class="panel-title"><i class="fas fa-gauge-high"></i> Driver Panel</div>

    <div class="info-row">
        <span class="label"><i class="fas fa-route"></i> Route</span>
        <span style="font-weight:600;color:#2c3e50">Town ↔ Irisan</span>
    </div>

    <div class="mb-2">
        <label class="form-label" style="font-weight:600;font-size:0.85rem;color:#444;margin-bottom:4px"><i class="fas fa-map-marker-alt" style="color:#667eea;margin-right:4px"></i> Heading to</label>
        <select id="destinationSelect" class="form-select" style="min-height:40px;border-radius:10px;border:1.5px solid #e0e0e0;font-size:0.85rem">
            <option value="irisan">Irisan Terminal</option>
            <option value="town">Town Terminal</option>
        </select>
    </div>

    <div class="info-row">
        <span class="label"><i class="fas fa-signal"></i> Status</span>
        <span id="statusText" class="status-badge available">Available</span>
    </div>

    <div class="info-row">
        <span class="label"><i class="fas fa-location-arrow"></i> Heading</span>
        <span id="destBadge" class="dest-badge"><i class="fas fa-arrow-right"></i> Irisan</span>
    </div>

    <div class="d-grid gap-2 mt-3">
        <button id="queueBtn" class="btn btn-queue" onclick="queueAtTerminal()"><i class="fas fa-list-ol"></i> Queue at Terminal</button>
        <div id="queueStatus">
            <div class="queue-position" id="queuePosition">#-</div>
            <div class="queue-label" id="queueLabel">in line at Terminal</div>
            <button class="btn btn-outline-danger btn-leave-queue" onclick="leaveQueue()"><i class="fas fa-times"></i> Leave Queue</button>
        </div>
        <button id="startBtn" class="btn btn-success btn-trip" onclick="startTrip()"><i class="fas fa-play"></i> Start Trip</button>
        <button id="endBtn" class="btn btn-danger btn-trip" onclick="endTrip()"><i class="fas fa-stop"></i> End Trip</button>
    </div>

    <div class="gps-indicator">
        <span class="gps-dot inactive" id="gpsDot"></span>
        <span id="gpsText">GPS: Inactive</span>
    </div>

    <hr style="margin:14px 0;border-color:#eee">
    <a href="index.html" class="btn btn-outline-secondary w-100 btn-sm" style="border-radius:8px"><i class="fas fa-map"></i> Back to Map</a>
</div>

<button id="panelToggle" onclick="togglePanel()"><i class="fas fa-bars"></i></button>

<div id="map"></div>

<script type="module">
const API_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

// Terminal coordinates
const TOWN = [16.412996, 120.593461];
const IRISAN = [16.429367, 120.549379];
const ARRIVAL_RADIUS_KM = 0.3; // 300 meters

function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    toast.className = 'toast-msg ' + type;
    toast.innerHTML = '<i class="fas ' + icon + '"></i> ' + message;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);
}

// Login verification
const loggedDriver = JSON.parse(localStorage.getItem("loggedInDriver"));
if (!loggedDriver) {
    showToast('Access denied. Redirecting to login...', 'error');
    setTimeout(() => window.location.href = "login.html", 1500);
}

document.getElementById("welcomeText").textContent = loggedDriver ? loggedDriver.username + " (" + loggedDriver.plate + ")" : "";

function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
window.logout = logout;

function togglePanel() {
    document.getElementById('driverPanel').classList.toggle('panel-collapsed');
}
window.togglePanel = togglePanel;

// --- Distance calculation ---
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// --- Server API helpers ---
async function apiUpdateStatus(plateNumber, status) {
    try {
        const res = await fetch(API_URL + '/api/jeepneys/' + encodeURIComponent(plateNumber) + '/status', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
        });
        return await res.json();
    } catch (err) {
        console.error('Status update error:', err);
        return { success: false, error: err.message };
    }
}

async function apiUpdateLocation(jeepneyId, plateNumber, latitude, longitude, status, destination) {
    try {
        const body = { plate_number: plateNumber, latitude, longitude, status, destination };
        if (jeepneyId) body.jeepney_id = jeepneyId;
        const res = await fetch(API_URL + '/api/locations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        return await res.json();
    } catch (err) {
        console.error('Location update error:', err);
        return { success: false, error: err.message };
    }
}

// --- SVG Icon generation ---
function createSvgIcon(svgStr, size, anchor, popupAnchor) {
    try {
        const iconUrl = 'data:image/svg+xml;base64,' + btoa(svgStr);
        return L.icon({ iconUrl, iconSize: size, iconAnchor: anchor, popupAnchor: popupAnchor || [0, 0] });
    } catch (e) {
        console.error('SVG icon error:', e);
        return null;
    }
}

// Determine jeepney type from loggedDriver
const driverJeepType = (loggedDriver && loggedDriver.jeepney_type) ? loggedDriver.jeepney_type : 'traditional';

// Traditional jeepney SVG (orange) - matches index.html
const traditionalJeepSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect x="4" y="8" width="24" height="14" rx="3" fill="#f97316" stroke="#c2410c" stroke-width="1.5"/><rect x="6" y="10" width="6" height="5" rx="1" fill="#fef3c7" stroke="#c2410c" stroke-width="0.5"/><rect x="13" y="10" width="6" height="5" rx="1" fill="#fef3c7" stroke="#c2410c" stroke-width="0.5"/><rect x="20" y="10" width="6" height="5" rx="1" fill="#fef3c7" stroke="#c2410c" stroke-width="0.5"/><rect x="2" y="18" width="28" height="4" rx="1" fill="#ea580c"/><circle cx="9" cy="24" r="3" fill="#374151" stroke="#9ca3af" stroke-width="1"/><circle cx="23" cy="24" r="3" fill="#374151" stroke="#9ca3af" stroke-width="1"/><rect x="14" y="5" width="4" height="4" rx="1" fill="#fbbf24" stroke="#c2410c" stroke-width="0.5"/><line x1="2" y1="14" x2="4" y2="14" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/><line x1="28" y1="14" x2="30" y2="14" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/></svg>';

// Modern jeepney SVG (blue) - matches index.html
const modernJeepSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect x="3" y="6" width="26" height="18" rx="4" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/><rect x="5" y="8" width="8" height="6" rx="2" fill="#dbeafe" stroke="#1d4ed8" stroke-width="0.5"/><rect x="15" y="8" width="8" height="6" rx="2" fill="#dbeafe" stroke="#1d4ed8" stroke-width="0.5"/><rect x="24" y="9" width="3" height="4" rx="1" fill="#dbeafe" stroke="#1d4ed8" stroke-width="0.5"/><rect x="3" y="19" width="26" height="4" rx="1" fill="#2563eb"/><circle cx="9" cy="26" r="3" fill="#374151" stroke="#9ca3af" stroke-width="1"/><circle cx="23" cy="26" r="3" fill="#374151" stroke="#9ca3af" stroke-width="1"/><rect x="5" y="16" width="22" height="2" rx="0.5" fill="#60a5fa"/><circle cx="6" cy="21" r="1.5" fill="#fbbf24"/><circle cx="26" cy="21" r="1.5" fill="#ef4444"/></svg>';

// Terminal SVG (green building) - matches index.html
const terminalSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><rect x="8" y="12" width="32" height="30" rx="3" fill="#22c55e" stroke="#15803d" stroke-width="2"/><polygon points="24,4 6,14 42,14" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/><rect x="12" y="16" width="8" height="8" rx="1" fill="#dcfce7" stroke="#15803d" stroke-width="0.8"/><rect x="28" y="16" width="8" height="8" rx="1" fill="#dcfce7" stroke="#15803d" stroke-width="0.8"/><rect x="18" y="28" width="12" height="14" rx="1" fill="#15803d"/><text x="24" y="24" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff" font-family="Arial,sans-serif">T</text></svg>';

const jeepSvg = driverJeepType === 'modern' ? modernJeepSvg : traditionalJeepSvg;

let jeepIconResolved = createSvgIcon(jeepSvg, [32, 32], [16, 16]);
let terminalIconResolved = createSvgIcon(terminalSvg, [48, 48], [24, 48], [0, -44]);

// Map setup
const map = L.map("map", { zoomControl: true }).setView([16.421, 120.571], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

let driverMarker;
let activeRouteControl = null;

// Current destination: 'irisan' or 'town'
let currentDestination = 'irisan';

function getDestCoords() {
    return currentDestination === 'irisan' ? IRISAN : TOWN;
}

function getDestName() {
    return currentDestination === 'irisan' ? 'Irisan' : 'Town';
}

function updateDestUI() {
    const badge = document.getElementById('destBadge');
    const sel = document.getElementById('destinationSelect');
    sel.value = currentDestination;
    badge.innerHTML = '<i class="fas fa-arrow-right"></i> ' + getDestName();
}

// Sync dropdown changes to destination
document.getElementById('destinationSelect').addEventListener('change', (e) => {
    currentDestination = e.target.value;
    updateDestUI();
});

function initMap() {
    function addTerminal(coords, label) {
        if (terminalIconResolved) {
            L.marker(coords, { icon: terminalIconResolved }).addTo(map).bindPopup("<b>" + label + "</b>");
        } else {
            L.circleMarker(coords, { radius: 12, fillColor: '#667eea', color: '#fff', weight: 2, fillOpacity: 0.9 }).addTo(map).bindPopup("<b>" + label + "</b>");
        }
    }
    addTerminal(TOWN, "Town Terminal");
    addTerminal(IRISAN, "Irisan Terminal");

    if (jeepIconResolved) {
        driverMarker = L.marker(TOWN, { icon: jeepIconResolved }).addTo(map);
    } else {
        driverMarker = L.circleMarker(TOWN, { radius: 10, fillColor: '#28a745', color: '#fff', weight: 2, fillOpacity: 0.9 }).addTo(map);
    }
}

initMap();

function showRouteToDestination(fromLat, fromLng) {
    if (activeRouteControl) { map.removeControl(activeRouteControl); activeRouteControl = null; }
    const dest = getDestCoords();
    activeRouteControl = L.Routing.control({
        waypoints: [L.latLng(fromLat, fromLng), L.latLng(dest[0], dest[1])],
        routeWhileDragging: false, show: false, addWaypoints: false, draggableWaypoints: false,
        lineOptions: { styles: [{ color: '#667eea', opacity: 0.7, weight: 5 }] }
    }).addTo(map);
}

// --- Auto-switch destination on arrival ---
let hasArrivedFlag = false;

function checkArrival(lat, lng) {
    const dest = getDestCoords();
    const dist = getDistance(lat, lng, dest[0], dest[1]);

    if (dist <= ARRIVAL_RADIUS_KM && !hasArrivedFlag) {
        hasArrivedFlag = true;
        // Arrived at destination — switch to opposite terminal
        const arrivedAt = getDestName();
        currentDestination = currentDestination === 'irisan' ? 'town' : 'irisan';
        updateDestUI();
        showToast('Arrived at ' + arrivedAt + '! Now heading to ' + getDestName(), 'info');

        // Redraw route to new destination
        showRouteToDestination(lat, lng);
    }

    // Reset flag when driver moves away from terminal
    if (dist > ARRIVAL_RADIUS_KM) {
        hasArrivedFlag = false;
    }
}

// --- Trip state ---
let watchId = null;
let sendInterval = null;
let lastLat = null, lastLng = null;
let currentStatus = "Available";

// --- Queue state (declared early for updateStatusUI) ---
let queuePollInterval = null;
let isQueued = false;
let queueTerminal = null;

function updateStatusUI() {
    const el = document.getElementById("statusText");
    const startBtn = document.getElementById('startBtn');
    const endBtn = document.getElementById('endBtn');
    const queueBtn = document.getElementById('queueBtn');
    if (currentStatus === "On Route") {
        el.textContent = "On Route"; el.className = "status-badge on-route";
        startBtn.disabled = true; startBtn.style.opacity = '0.5';
        endBtn.disabled = false; endBtn.style.opacity = '1';
        if (queueBtn) queueBtn.style.display = 'none';
    } else {
        el.textContent = "Available"; el.className = "status-badge available";
        startBtn.disabled = false; startBtn.style.opacity = '1';
        endBtn.disabled = true; endBtn.style.opacity = '0.5';
        if (queueBtn && !isQueued) queueBtn.style.display = 'flex';
    }
}

function updateGPS(active) {
    document.getElementById('gpsDot').className = 'gps-dot ' + (active ? 'active' : 'inactive');
    document.getElementById('gpsText').textContent = 'GPS: ' + (active ? 'Tracking' : 'Inactive');
}

updateStatusUI();
updateDestUI();

async function startTrip() {
    if (!loggedDriver || currentStatus === "On Route") return;
    const btn = document.getElementById('startBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Starting...';

    document.getElementById('destinationSelect').disabled = true;

    // Clear queue state if queued
    if (isQueued) {
        isQueued = false;
        queueTerminal = null;
        if (queuePollInterval) { clearInterval(queuePollInterval); queuePollInterval = null; }
    }
    updateQueueUI(null, null);
    document.getElementById('queueBtn').style.display = 'none';

    currentStatus = "On Route";
    updateStatusUI();

    const result = await apiUpdateStatus(loggedDriver.plate, "On Route");
    if (!result.success) {
        showToast('Failed to update status: ' + (result.error || 'Unknown error'), 'error');
        currentStatus = "Available";
        updateStatusUI();
        document.getElementById('destinationSelect').disabled = false;
        btn.innerHTML = '<i class="fas fa-play"></i> Start Trip';
        return;
    }

    showToast('Trip started! Heading to ' + getDestName() + '. GPS tracking active.', 'success');
    btn.innerHTML = '<i class="fas fa-play"></i> Start Trip';

    if (!navigator.geolocation) {
        showToast('GPS not available on this device', 'error');
        updateGPS(false);
        return;
    }

    updateGPS(true);

    watchId = navigator.geolocation.watchPosition(
        (pos) => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            driverMarker.setLatLng([lat, lng]);
            lastLat = lat;
            lastLng = lng;
            // Check if arrived at destination
            checkArrival(lat, lng);
        },
        (err) => {
            console.error("GPS error:", err);
            updateGPS(false);
            showToast('GPS signal lost. Make sure location is enabled.', 'error');
        },
        { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
    );

    navigator.geolocation.getCurrentPosition(
        async (pos) => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            driverMarker.setLatLng([lat, lng]);
            map.setView([lat, lng], 15);
            showRouteToDestination(lat, lng);
            lastLat = lat; lastLng = lng;
            await apiUpdateLocation(loggedDriver.jeepneyId, loggedDriver.plate, lat, lng, "On Route", currentDestination);
        },
        () => {},
        { enableHighAccuracy: true }
    );

    sendInterval = setInterval(async () => {
        if (lastLat !== null && lastLng !== null && currentStatus === "On Route") {
            await apiUpdateLocation(loggedDriver.jeepneyId, loggedDriver.plate, lastLat, lastLng, "On Route", currentDestination);
        }
    }, 2000);
}

async function endTrip() {
    if (!loggedDriver || currentStatus !== "On Route") return;
    const btn = document.getElementById('endBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Ending...';

    currentStatus = "Available";
    updateStatusUI();

    const result = await apiUpdateStatus(loggedDriver.plate, "Available");
    if (!result.success) {
        showToast('Failed to update status: ' + (result.error || 'Unknown error'), 'error');
    }

    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (sendInterval) { clearInterval(sendInterval); sendInterval = null; }
    if (activeRouteControl) { map.removeControl(activeRouteControl); activeRouteControl = null; }
    updateGPS(false);
    lastLat = null; lastLng = null;
    hasArrivedFlag = false;

    document.getElementById('destinationSelect').disabled = false;

    // Re-show queue button
    const queueBtn = document.getElementById('queueBtn');
    queueBtn.style.display = 'flex';
    queueBtn.innerHTML = '<i class="fas fa-list-ol"></i> Queue at Terminal';
    queueBtn.disabled = false;

    btn.innerHTML = '<i class="fas fa-stop"></i> End Trip';
    showToast('Trip ended.', 'info');
}

// --- Queue at Terminal ---

function getClosestTerminal(lat, lng) {
    const distToTown = getDistance(lat, lng, TOWN[0], TOWN[1]);
    const distToIrisan = getDistance(lat, lng, IRISAN[0], IRISAN[1]);
    return distToTown <= distToIrisan ? 'town' : 'irisan';
}

function getTerminalDisplayName(terminal) {
    return terminal === 'town' ? 'Town Terminal' : 'Irisan Terminal';
}

function updateQueueUI(position, terminal) {
    const queueStatus = document.getElementById('queueStatus');
    const queuePosition = document.getElementById('queuePosition');
    const queueLabel = document.getElementById('queueLabel');
    const queueBtn = document.getElementById('queueBtn');

    if (position !== null && terminal) {
        queueStatus.style.display = 'block';
        queuePosition.textContent = '#' + position;
        queueLabel.textContent = 'in line at ' + getTerminalDisplayName(terminal);
        queueBtn.style.display = 'none';
    } else {
        queueStatus.style.display = 'none';
        queueBtn.style.display = 'flex';
    }
}

async function queueAtTerminal() {
    if (!loggedDriver || isQueued || currentStatus === 'On Route') return;

    const queueBtn = document.getElementById('queueBtn');
    queueBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Joining queue...';
    queueBtn.disabled = true;

    try {
        // Get current GPS position to determine closest terminal
        const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
        });

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        queueTerminal = getClosestTerminal(lat, lng);

        const res = await fetch(API_URL + '/api/terminal-queue', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ terminal: queueTerminal, plate_number: loggedDriver.plate })
        });
        const data = await res.json();

        if (data.success || data.position) {
            isQueued = true;
            const position = data.position || 1;
            updateQueueUI(position, queueTerminal);
            showToast('Queued at ' + getTerminalDisplayName(queueTerminal) + ' - Position #' + position, 'success');

            // Start polling for queue updates
            startQueuePolling();
        } else {
            showToast('Failed to join queue: ' + (data.error || 'Unknown error'), 'error');
            queueBtn.innerHTML = '<i class="fas fa-list-ol"></i> Queue at Terminal';
            queueBtn.disabled = false;
        }
    } catch (err) {
        console.error('Queue error:', err);
        showToast('Could not join queue. Check GPS and try again.', 'error');
        queueBtn.innerHTML = '<i class="fas fa-list-ol"></i> Queue at Terminal';
        queueBtn.disabled = false;
    }
}

function startQueuePolling() {
    if (queuePollInterval) clearInterval(queuePollInterval);

    queuePollInterval = setInterval(async () => {
        if (!isQueued || !loggedDriver) {
            clearInterval(queuePollInterval);
            queuePollInterval = null;
            return;
        }

        try {
            const res = await fetch(API_URL + '/api/terminal-queue?terminal=' + encodeURIComponent(queueTerminal));
            const data = await res.json();

            const queueArr = data.data && data.data[queueTerminal];
            if (queueArr && Array.isArray(queueArr)) {
                const myEntry = queueArr.find(entry => entry.plate_number === loggedDriver.plate);

                if (myEntry) {
                    // Still in queue - update position
                    const position = queueArr.indexOf(myEntry) + 1;
                    updateQueueUI(position, queueTerminal);
                } else {
                    // No longer in queue - check if dispatched
                    isQueued = false;
                    clearInterval(queuePollInterval);
                    queuePollInterval = null;
                    updateQueueUI(null, null);

                    // Auto-start trip (dispatched by dispatcher)
                    showToast("You've been dispatched! Starting trip...", 'success');

                    // Set destination to opposite of queue terminal
                    currentDestination = queueTerminal === 'town' ? 'irisan' : 'town';
                    updateDestUI();

                    // Small delay then start trip
                    setTimeout(() => { startTrip(); }, 500);
                }
            }
        } catch (err) {
            console.error('Queue poll error:', err);
        }
    }, 3000);
}

async function leaveQueue() {
    if (!loggedDriver || !isQueued) return;

    try {
        const res = await fetch(API_URL + '/api/terminal-queue/' + encodeURIComponent(loggedDriver.plate), {
            method: 'DELETE'
        });
        const data = await res.json();

        isQueued = false;
        queueTerminal = null;
        if (queuePollInterval) { clearInterval(queuePollInterval); queuePollInterval = null; }
        updateQueueUI(null, null);

        const queueBtn = document.getElementById('queueBtn');
        queueBtn.innerHTML = '<i class="fas fa-list-ol"></i> Queue at Terminal';
        queueBtn.disabled = false;

        showToast('Left the queue.', 'info');
    } catch (err) {
        console.error('Leave queue error:', err);
        showToast('Error leaving queue. Try again.', 'error');
    }
}

window.startTrip = startTrip;
window.endTrip = endTrip;
window.queueAtTerminal = queueAtTerminal;
window.leaveQueue = leaveQueue;
</script>
