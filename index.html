<!DOCTYPE html>
<html lang="eng">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BAG-Q</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
#mainHeader{
position:fixed;
top:0;
left:0;
width:100%;
height:60px;
background:#f2f2f2;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 25px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
z-index:2000;
}
#map{
height:calc(100vh - 60px);
margin-top:60px;
}
#jeepCounter{
position:absolute;
top:70px;
right:30px;
background:white;
padding:10px 15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
z-index:2100;
font-weight:bold;
}
</style>
</head>

<body>

<div id="mainHeader">
    <strong>BAG-Q</strong>
    <div>
        <a href="driver.html" class="btn btn-outline-dark btn-sm">Driver</a>
        <a href="login.html" class="btn btn-outline-dark btn-sm">Login</a>
    </div>
</div>

<div id="jeepCounter">Jeepneys on Road: 0</div>
<div id="map"></div>

<script>

/* ==============================
   📍 TERMINALS
================================= */

const irisanTerminal=[16.4161384,120.5573176];
const quirinoTerminal=[16.4130536,120.5934281];

/* ==============================
   🗺 INITIALIZE MAP
================================= */

const map=L.map("map").setView(irisanTerminal,14);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
attribution:"© OpenStreetMap contributors"
}).addTo(map);

/* ==============================
   👤 SHOW PASSENGER LOCATION
================================= */

const userIcon=L.icon({
iconUrl:'user.png',
iconSize:[30,30],
iconAnchor:[15,15]
});

let userMarker=null;

if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
(pos)=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

userMarker=L.marker([lat,lng],{icon:userIcon})
.addTo(map)
.bindPopup("You are here");

map.setView([lat,lng],15);
},
(err)=>console.log(err),
{enableHighAccuracy:true}
);
}

/* ==============================
   🚙 JEEP ICON
================================= */

const jeepIcon=L.icon({
iconUrl:'jeepney.png',
iconSize:[32,32],
iconAnchor:[16,16]
});

/* ==============================
   📏 DISTANCE FUNCTION
================================= */

function getDistance(lat1,lon1,lat2,lon2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);
const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

/* ==============================
   🚙 LIVE JEEP SYSTEM
================================= */

let jeepMarkers={};
let activeRoute=null;

function loadLiveJeepneys(){

let jeepCount=0;

for(let key in localStorage){

if(key.startsWith("live_")){

const data=JSON.parse(localStorage.getItem(key));

if(data.status==="On Route"){

jeepCount++;

if(!jeepMarkers[data.plate]){

jeepMarkers[data.plate]=L.marker(
[data.lat,data.lng],
{icon:jeepIcon}
).addTo(map);

jeepMarkers[data.plate].on("click",()=>{
showRoute(data.lat,data.lng,data.plate);
});

}else{

jeepMarkers[data.plate]
.setLatLng([data.lat,data.lng]);
}

/* ETA */
const distance=getDistance(
data.lat,
data.lng,
quirinoTerminal[0],
quirinoTerminal[1]
);

const avgSpeed=25;
const etaMinutes=Math.round((distance/avgSpeed)*60);

jeepMarkers[data.plate].bindPopup(
"<b>Plate:</b> "+data.plate+
"<br><b>Status:</b> "+data.status+
"<br><b>ETA:</b> "+etaMinutes+" mins"+
"<br><i>Click to view route</i>"
);
}
}
}

document.getElementById("jeepCounter")
.textContent="Jeepneys on Road: "+jeepCount;
}

setInterval(loadLiveJeepneys,3000);

/* ==============================
   🛣 SHOW ROUTE ONLY WHEN CLICKED
================================= */

function showRoute(lat,lng,plate){

if(activeRoute){
map.removeControl(activeRoute);
}

activeRoute=L.Routing.control({
waypoints:[
L.latLng(lat,lng),
L.latLng(quirinoTerminal[0],quirinoTerminal[1])
],
routeWhileDragging:false,
addWaypoints:false,
draggableWaypoints:false,
show:false,
lineOptions:{
styles:[{color:'blue',weight:5}]
}
}).addTo(map);

}

</script>
</body>
</html>
