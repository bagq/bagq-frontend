<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BAG-Q - Jeepney Tracker</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

#mainHeader {
    position: fixed; top: 0; left: 0; width: 100%; height: 56px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); z-index: 2000;
}
#mainHeader .brand { font-weight: 700; font-size: 1.15rem; color: #fff; display: flex; align-items: center; gap: 8px; }
#mainHeader .brand i { font-size: 1.3rem; }
#mainHeader .nav-links { display: flex; gap: 8px; align-items: center; }
#mainHeader .nav-links .btn { border-radius: 8px; font-size: 0.8rem; font-weight: 600; }

#map { height: calc(100vh - 56px); margin-top: 56px; width: 100%; }

#jeepCounter {
    position: fixed; z-index: 2100; font-weight: 600;
    background: #fff; padding: 10px 18px; border-radius: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.12); font-size: 0.9rem;
    display: flex; align-items: center; gap: 8px;
    transition: transform 0.3s;
}
#jeepCounter i { color: #667eea; }
#jeepCount { color: #667eea; font-weight: 700; font-size: 1.1rem; }

@media (min-width: 769px) {
    #jeepCounter { top: 68px; right: 16px; }
}
@media (max-width: 768px) {
    #jeepCounter { bottom: 20px; left: 50%; transform: translateX(-50%); top: auto; right: auto; }
    #mainHeader { padding: 0 12px; }
    #mainHeader .brand { font-size: 1rem; }
    .btn-sm { font-size: 0.75rem !important; padding: 4px 10px !important; }
}

#reconnectBanner {
    position: fixed; top: 56px; left: 0; width: 100%;
    background: linear-gradient(135deg, #f7971e, #ffd200); color: #333;
    text-align: center; padding: 8px; font-size: 0.85rem; font-weight: 600;
    z-index: 2050; display: none;
}

#toastContainer { position: fixed; top: 20px; right: 20px; z-index: 9999; }
.toast-msg {
    padding: 12px 20px; border-radius: 10px; color: #fff; margin-bottom: 8px;
    animation: slideIn 0.3s; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
}
.toast-msg.success { background: #28a745; }
.toast-msg.error { background: #dc3545; }
.toast-msg.info { background: #17a2b8; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.pulse { animation: pulse 0.4s; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
@media (max-width: 768px) {
    .pulse { animation: pulseMobile 0.4s; }
    @keyframes pulseMobile { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.08); } }
}

.leaflet-popup-content { font-size: 0.9rem; line-height: 1.6; min-width: 180px; }
.popup-plate { font-weight: 700; font-size: 1.05rem; margin-bottom: 4px; color: #2c3e50; }
.popup-status { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; color: #fff; }
.popup-status.on-route { background: #28a745; }
.popup-status.available { background: #ffc107; color: #333; }
.popup-eta { margin-top: 4px; font-size: 0.85rem; color: #555; }
.popup-eta i { color: #667eea; }
.popup-direction { margin-top: 6px; padding: 4px 10px; border-radius: 8px; background: #eef2ff; color: #667eea; font-weight: 600; font-size: 0.82rem; display: inline-block; }
.popup-direction i { margin-right: 4px; }
</style>
</head>

<body>

<div id="toastContainer"></div>
<div id="reconnectBanner"><i class="fas fa-wifi"></i> Connection lost. Reconnecting...</div>

<div id="mainHeader">
    <span class="brand"><i class="fas fa-bus"></i> BAG-Q</span>
    <div class="nav-links" id="navLinks"></div>
</div>

<div id="jeepCounter"><i class="fas fa-bus-alt"></i> Jeepneys on Road: <span id="jeepCount">0</span></div>
<div id="map"></div>

<script type="module">
import { supabase, subscribeToLocations } from './supabase-client.js';

const API_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

// Terminal coordinates
const TOWN = [16.4161384, 120.5573176];
const CYPRESS = [16.429639, 120.549139];

function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    toast.className = 'toast-msg ' + type;
    toast.innerHTML = '<i class="fas ' + icon + '"></i> ' + message;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);
}

// Auth-aware header
function setupNav() {
    const nav = document.getElementById('navLinks');
    const stored = localStorage.getItem("currentUser");
    if (stored) {
        const user = JSON.parse(stored);
        const meta = user.user_metadata || {};
        const name = meta.username || user.email;
        let html = '<span class="text-white me-2 d-none d-sm-inline" style="font-size:0.85rem;opacity:0.9"><i class="fas fa-user-circle"></i> ' + name + '</span>';
        if (meta.role === 'driver') html += '<a href="driver.html" class="btn btn-light btn-sm"><i class="fas fa-gauge-high"></i> Dashboard</a> ';
        if (meta.role === 'dispatcher') html += '<a href="register.html" class="btn btn-light btn-sm"><i class="fas fa-user-plus"></i> Register</a> ';
        html += '<button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>';
        nav.innerHTML = html;
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.reload();
        });
    } else {
        nav.innerHTML = '<a href="login.html" class="btn btn-light btn-sm"><i class="fas fa-sign-in-alt"></i> Login</a>';
    }
}
setupNav();

const map = L.map("map").setView([16.422, 120.553], 14);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

// Icon preload
let jeepIconResolved = null;
let terminalIconResolved = null;
(function preloadIcons() {
    const jeepImg = new Image();
    jeepImg.onload = () => { jeepIconResolved = L.icon({ iconUrl: 'jeep.png', iconSize: [32, 32], iconAnchor: [16, 16] }); };
    jeepImg.onerror = () => { jeepIconResolved = null; };
    jeepImg.src = 'jeep.png';

    const termImg = new Image();
    termImg.onload = () => { terminalIconResolved = L.icon({ iconUrl: 'terminal.png', iconSize: [55, 55], iconAnchor: [27, 55], popupAnchor: [0, -50] }); addTerminalMarkers(); };
    termImg.onerror = () => { terminalIconResolved = null; addTerminalMarkers(); };
    termImg.src = 'terminal.png';
})();

function addTerminalMarkers() {
    function addTerminal(coords, label) {
        if (terminalIconResolved) {
            L.marker(coords, { icon: terminalIconResolved }).addTo(map).bindPopup("<b>" + label + "</b>");
        } else {
            L.circleMarker(coords, { radius: 12, fillColor: '#667eea', color: '#fff', weight: 2, fillOpacity: 0.9 }).addTo(map).bindPopup("<b>" + label + "</b>");
        }
    }
    addTerminal(TOWN, "Town Terminal");
    addTerminal(CYPRESS, "Cypress Terminal");
}

function makeJeepMarker(lat, lng) {
    if (jeepIconResolved) return L.marker([lat, lng], { icon: jeepIconResolved });
    return L.circleMarker([lat, lng], { radius: 10, fillColor: '#28a745', color: '#fff', weight: 2, fillOpacity: 0.9 });
}

// User location
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            L.circleMarker([lat, lng], { radius: 8, fillColor: '#667eea', color: '#fff', weight: 2, fillOpacity: 0.9 })
                .addTo(map).bindPopup("<b>You are here</b>");
            map.setView([lat, lng], 15);
        },
        err => console.log("Geolocation error:", err),
        { enableHighAccuracy: true }
    );
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function buildPopup(plate, status, lat, lng, destination) {
    const distTown = getDistance(lat, lng, TOWN[0], TOWN[1]);
    const distCypress = getDistance(lat, lng, CYPRESS[0], CYPRESS[1]);
    const etaTown = Math.max(1, Math.round((distTown / 25) * 60));
    const etaCypress = Math.max(1, Math.round((distCypress / 25) * 60));
    const statusClass = status === 'On Route' ? 'on-route' : 'available';

    let directionHtml = '';
    if (destination === 'cypress') {
        directionHtml = '<div class="popup-direction"><i class="fas fa-arrow-right"></i> On the way to Cypress</div>';
    } else if (destination === 'town') {
        directionHtml = '<div class="popup-direction"><i class="fas fa-arrow-left"></i> On the way to Town</div>';
    }

    return '<div class="popup-plate"><i class="fas fa-bus" style="color:#667eea"></i> ' + plate + '</div>' +
        '<span class="popup-status ' + statusClass + '">' + status + '</span>' +
        directionHtml +
        '<div class="popup-eta"><i class="fas fa-clock"></i> ~' + etaTown + ' min to Town</div>' +
        '<div class="popup-eta"><i class="fas fa-clock"></i> ~' + etaCypress + ' min to Cypress</div>' +
        '<small style="color:#aaa"><i class="fas fa-route"></i> Tap for route</small>';
}

// --- Smooth marker movement ---
function smoothMove(marker, newLat, newLng, duration) {
    const oldLatLng = marker.getLatLng();
    const startLat = oldLatLng.lat, startLng = oldLatLng.lng;
    const dLat = newLat - startLat, dLng = newLng - startLng;

    // Skip animation if distance too small or too large
    const dist = Math.abs(dLat) + Math.abs(dLng);
    if (dist < 0.000001 || dist > 0.1) {
        marker.setLatLng([newLat, newLng]);
        return;
    }

    const start = performance.now();
    function animate(now) {
        const elapsed = now - start;
        const t = Math.min(elapsed / duration, 1);
        const lat = startLat + dLat * t;
        const lng = startLng + dLng * t;
        marker.setLatLng([lat, lng]);
        if (t < 1) requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
}

let jeepMarkers = {};
let jeepLastSeen = {};
let jeepDestinations = {}; // Track destinations for each plate
let activeRoute = null;

async function loadLiveJeepneys() {
    try {
        const res = await fetch(API_URL + '/api/locations');
        const result = await res.json();
        if (!result.success) { console.error("Error:", result.error); return; }
        const locations = result.data;

        let jeepCount = 0;
        const activePlates = new Set();

        locations.forEach(loc => {
            jeepCount++;
            activePlates.add(loc.plate_number);
            jeepLastSeen[loc.plate_number] = Date.now();
            if (loc.destination) jeepDestinations[loc.plate_number] = loc.destination;

            if (!jeepMarkers[loc.plate_number]) {
                jeepMarkers[loc.plate_number] = makeJeepMarker(loc.latitude, loc.longitude).addTo(map);
                jeepMarkers[loc.plate_number].on("click", () => {
                    const pos = jeepMarkers[loc.plate_number].getLatLng();
                    showRoute(pos.lat, pos.lng, loc.plate_number);
                });
            } else {
                // Smooth animation over 1.5 seconds
                smoothMove(jeepMarkers[loc.plate_number], loc.latitude, loc.longitude, 1500);
            }
            jeepMarkers[loc.plate_number].bindPopup(
                buildPopup(loc.plate_number, loc.status, loc.latitude, loc.longitude, jeepDestinations[loc.plate_number])
            );
        });

        Object.keys(jeepMarkers).forEach(plate => {
            if (!activePlates.has(plate) || (Date.now() - (jeepLastSeen[plate] || 0)) > 30000) {
                map.removeLayer(jeepMarkers[plate]);
                delete jeepMarkers[plate];
                delete jeepLastSeen[plate];
                delete jeepDestinations[plate];
            }
        });

        const countEl = document.getElementById('jeepCount');
        const counterEl = document.getElementById('jeepCounter');
        if (parseInt(countEl.textContent) !== jeepCount) {
            counterEl.classList.add('pulse');
            setTimeout(() => counterEl.classList.remove('pulse'), 400);
        }
        countEl.textContent = jeepCount;
    } catch (err) {
        console.error("loadLiveJeepneys error:", err);
    }
}

setInterval(loadLiveJeepneys, 2000);
loadLiveJeepneys();

let locationSub = null;
let statusSub = null;

function setupRealtime() {
    locationSub = subscribeToLocations((newLoc) => {
        document.getElementById('reconnectBanner').style.display = 'none';
        if (newLoc.status === "On Route") {
            jeepLastSeen[newLoc.plate_number] = Date.now();
            if (!jeepMarkers[newLoc.plate_number]) {
                jeepMarkers[newLoc.plate_number] = makeJeepMarker(newLoc.latitude, newLoc.longitude).addTo(map);
                jeepMarkers[newLoc.plate_number].on("click", () => {
                    const pos = jeepMarkers[newLoc.plate_number].getLatLng();
                    showRoute(pos.lat, pos.lng, newLoc.plate_number);
                });
            } else {
                smoothMove(jeepMarkers[newLoc.plate_number], newLoc.latitude, newLoc.longitude, 1500);
            }
            jeepMarkers[newLoc.plate_number].bindPopup(
                buildPopup(newLoc.plate_number, newLoc.status, newLoc.latitude, newLoc.longitude, jeepDestinations[newLoc.plate_number])
            );

            const countEl = document.getElementById('jeepCount');
            const currentCount = Object.keys(jeepMarkers).length;
            if (parseInt(countEl.textContent) !== currentCount) {
                document.getElementById('jeepCounter').classList.add('pulse');
                setTimeout(() => document.getElementById('jeepCounter').classList.remove('pulse'), 400);
            }
            countEl.textContent = currentCount;
        }
    });

    statusSub = supabase
        .channel('jeepneys_status_changes')
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'jeepneys' }, (payload) => {
            const jeep = payload.new;
            if (jeep.status !== 'On Route' && jeepMarkers[jeep.plate_number]) {
                map.removeLayer(jeepMarkers[jeep.plate_number]);
                delete jeepMarkers[jeep.plate_number];
                delete jeepLastSeen[jeep.plate_number];
                delete jeepDestinations[jeep.plate_number];
                document.getElementById('jeepCount').textContent = Object.keys(jeepMarkers).length;
            }
        })
        .subscribe();
}
setupRealtime();

setInterval(() => {
    if (locationSub && locationSub.state !== 'joined') {
        document.getElementById('reconnectBanner').style.display = 'block';
        supabase.removeChannel(locationSub);
        if (statusSub) supabase.removeChannel(statusSub);
        setupRealtime();
    }
}, 10000);

function showRoute(lat, lng, plate) {
    if (activeRoute) map.removeControl(activeRoute);
    // Use jeepney's destination if known, otherwise nearest terminal
    let dest;
    if (plate && jeepDestinations[plate]) {
        dest = jeepDestinations[plate] === 'cypress' ? CYPRESS : TOWN;
    } else {
        const dist1 = getDistance(lat, lng, TOWN[0], TOWN[1]);
        const dist2 = getDistance(lat, lng, CYPRESS[0], CYPRESS[1]);
        dest = dist1 < dist2 ? TOWN : CYPRESS;
    }
    activeRoute = L.Routing.control({
        waypoints: [L.latLng(lat, lng), L.latLng(dest[0], dest[1])],
        routeWhileDragging: false, addWaypoints: false, draggableWaypoints: false, show: false,
        lineOptions: { styles: [{ color: '#667eea', weight: 5, opacity: 0.8 }] }
    }).addTo(map);
}
</script>
</body>
</html>
