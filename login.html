<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAG-Q Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 15px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

.card-auth {
    width: 100%;
    max-width: 400px;
    background: #fff;
    padding: 32px 28px;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.card-auth .logo { text-align: center; margin-bottom: 6px; }
.card-auth .logo i { font-size: 2.2rem; color: #667eea; }
.card-auth h4 { font-weight: 700; color: #2c3e50; }
.card-auth .subtitle { color: #888; font-size: 0.9rem; text-align: center; margin-bottom: 24px; }

.form-label { font-weight: 600; font-size: 0.85rem; color: #444; margin-bottom: 4px; }
.form-label i { margin-right: 4px; color: #667eea; width: 16px; text-align: center; }

.form-control {
    min-height: 44px; border-radius: 10px; border: 1.5px solid #e0e0e0;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.form-control:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }

.field-error { color: #dc3545; font-size: 0.8rem; margin-top: 3px; }

.password-wrapper { position: relative; }
.password-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    border: none; background: none; cursor: pointer; color: #999; font-size: 0.85rem; padding: 0;
}
.password-toggle:hover { color: #667eea; }

.btn-login {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none; color: #fff; font-weight: 600; min-height: 46px;
    border-radius: 10px; font-size: 1rem; transition: opacity 0.2s, transform 0.1s;
}
.btn-login:hover { opacity: 0.9; color: #fff; }
.btn-login:active { transform: scale(0.98); }
.btn-login:disabled { opacity: 0.7; }

#toastContainer { position: fixed; top: 20px; right: 20px; z-index: 9999; }
.toast-msg {
    padding: 12px 20px; border-radius: 10px; color: #fff; margin-bottom: 8px;
    animation: slideIn 0.3s ease; max-width: 350px; word-wrap: break-word;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15); font-size: 0.9rem;
    display: flex; align-items: center; gap: 8px;
}
.toast-msg.success { background: #28a745; }
.toast-msg.error { background: #dc3545; }
.toast-msg.info { background: #17a2b8; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.auth-link { color: #667eea; font-weight: 600; text-decoration: none; }
.auth-link:hover { color: #764ba2; text-decoration: underline; }
</style>
</head>

<body>

<div id="toastContainer"></div>

<div class="card-auth">

<div class="logo"><i class="fas fa-bus"></i></div>
<h4 class="text-center mb-1">Welcome Back</h4>
<p class="subtitle">Sign in to your BAG-Q account</p>

<form id="loginForm">

<div class="mb-3">
    <label class="form-label" for="loginInput"><i class="fas fa-user"></i> Username or Email</label>
    <input id="loginInput" class="form-control" placeholder="Enter your email or username" required>
    <div id="loginInput-error" class="field-error"></div>
</div>

<div class="mb-3">
    <label class="form-label" for="password"><i class="fas fa-lock"></i> Password</label>
    <div class="password-wrapper">
        <input id="password" type="password" class="form-control" placeholder="Enter your password" required>
        <button type="button" id="togglePassword" class="password-toggle"><i class="fas fa-eye"></i></button>
    </div>
    <div id="password-error" class="field-error"></div>
</div>


<button type="submit" id="loginBtn" class="btn btn-login w-100">
    <i class="fas fa-sign-in-alt"></i> Sign In
</button>

<p class="text-center mt-3 mb-0" style="font-size:0.85rem">
    <a href="index.html" class="auth-link"><i class="fas fa-map"></i> View Map</a>
    <span style="color:#ccc; margin:0 8px">|</span>
    <a href="register.html" class="auth-link"><i class="fas fa-user-plus"></i> Register</a>
</p>
<p class="text-center mt-2 mb-0" style="font-size:0.78rem;color:#aaa">
    Registration requires moderator access.
</p>

</form>
</div>

<script type="module">
const API_URL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

// Session check
const stored = localStorage.getItem("currentUser");
if (stored) {
    const user = JSON.parse(stored);
    const role = user.user_metadata?.role;
    if (role === 'driver') window.location.href = 'driver.html';
    else if (role === 'dispatcher') window.location.href = 'dispatcher.html';
    else if (role === 'moderator') window.location.href = 'moderator.html';
    else window.location.href = 'index.html';
}

// Toast system
function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    toast.className = 'toast-msg ' + type;
    toast.innerHTML = '<i class="fas ' + icon + '"></i> ' + message;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);
}

// Field errors
function showFieldError(fieldId, msg) {
    const el = document.getElementById(fieldId + '-error');
    if (el) el.textContent = msg;
}
function clearErrors() {
    document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
}

// Password toggle
document.getElementById('togglePassword').addEventListener('click', () => {
    const pwd = document.getElementById('password');
    const icon = document.querySelector('#togglePassword i');
    if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'fas fa-eye-slash'; }
    else { pwd.type = 'password'; icon.className = 'fas fa-eye'; }
});

// Login form — uses server-side /api/login (handles username lookup + auth)
document.getElementById("loginForm").addEventListener("submit", async e => {
    e.preventDefault();
    clearErrors();

    const input = document.getElementById("loginInput").value.trim();
    const password = document.getElementById("password").value;

    if (!input) { showFieldError('loginInput', 'Please enter your email or username'); return; }
    if (!password) { showFieldError('password', 'Please enter your password'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';

    try {
        const body = { input, password };

        const response = await fetch(API_URL + '/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.error || 'Login failed');
        }

        // Store all data in localStorage
        localStorage.setItem("currentUser", JSON.stringify(result.user));
        localStorage.setItem("supabaseSession", JSON.stringify(result.session));
        localStorage.setItem("userProfile", JSON.stringify(result.profile));

        if (result.profile.role === "driver" && result.jeepney) {
            localStorage.setItem("loggedInDriver", JSON.stringify({
                username: result.profile.username,
                plate: result.jeepney.plate_number,
                jeepneyId: result.jeepney.id,
                userId: result.user.id,
                jeepney_type: result.jeepney.jeepney_type || 'traditional',
                seating_capacity: result.jeepney.seating_capacity || 16
            }));
        }

        showToast('Login successful!', 'success');
        setTimeout(() => {
            if (result.profile.role === "driver") window.location.href = "driver.html";
            else if (result.profile.role === "dispatcher") window.location.href = "dispatcher.html";
            else if (result.profile.role === "moderator") window.location.href = "moderator.html";
            else window.location.href = "index.html";
        }, 1000);

    } catch (err) {
        showToast(err.message || 'Login failed', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
});
</script>

</body>
</html>
