<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BAG-Q Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f5f6fa;
}

.card-auth{
width:400px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 25px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="card-auth">

<h4 class="text-center mb-3">BAG-Q Login</h4>

<form id="loginForm">

<div class="mb-3">
<label>Username / Email</label>
<input id="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input id="password" type="password" class="form-control" required>
</div>

<div id="errorMsg" class="text-danger mb-2"></div>

<button class="btn btn-primary w-100">Login</button>

<p class="text-center mt-3">
No account?
<a href="register.html">Register</a>
</p>

</form>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* ===== SUPABASE CONFIG ===== */

const SUPABASE_URL = "https://jiypktabinncpbhoulte.supabase.co";
const SUPABASE_ANON_KEY = "PUT YOUR ANON KEY HERE";

const supabase = createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/* ===== LOGIN FORM ===== */

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const errorBox = document.getElementById("errorMsg");
    errorBox.innerText = "";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    try {

        const { data, error } = await supabase.auth.signInWithPassword({
            email: username,
            password: password
        });

        if(error) throw error;

        console.log("Login success:", data);

        /* Store session */
        localStorage.setItem("currentUser", JSON.stringify(data.user));

        alert("Login successful!");

        /* Redirect */
        window.location.href = "index.html";

    } catch(err){
        errorBox.innerText = err.message;
    }
});

</script>

</body>
</html>
